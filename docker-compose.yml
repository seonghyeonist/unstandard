services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: unstandard-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unstandard}
      POSTGRES_USER: ${POSTGRES_USER:-unstandard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unstandard} -d ${POSTGRES_DB:-unstandard}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # tei and depth-service are dormant Local AI PoC scaffolding, not the live
  # scorer (the app always uses the deterministic mock-local-heuristic-v0.0).
  # They only start with `docker compose --profile local-ai-poc up`; a plain
  # `docker compose up` never starts them. See docs/LOCAL_AI_POC_STATUS.md.
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    container_name: unstandard-tei-bge-m3
    profiles: ["local-ai-poc"]
    command: ["--model-id", "BAAI/bge-m3", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes:
      - hf-cache:/data
    environment:
      HF_HOME: /data

  depth-service:
    build:
      context: ./services/depth-service
    container_name: unstandard-depth-service
    profiles: ["local-ai-poc"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://unstandard:localdev@postgres:5432/unstandard}
      TEI_BASE_URL: ${TEI_BASE_URL:-http://tei:8080}
      # No default remote target: Qwen review stays off unless both
      # QWEN_REVIEW_URL and app_config qwen_review_enabled are explicitly set.
      QWEN_REVIEW_URL: ${QWEN_REVIEW_URL:-}
      APP_CONFIG_CACHE_TTL_SECONDS: ${APP_CONFIG_CACHE_TTL_SECONDS:-5}
      # Server-only opt-in + service auth. Absence keeps /internal/depth/evaluate
      # fail-closed even if this container were started.
      UNSTANDARD_LOCAL_AI_POC_ENABLED: ${UNSTANDARD_LOCAL_AI_POC_ENABLED:-}
      UNSTANDARD_DEPTH_SERVICE_TOKEN: ${UNSTANDARD_DEPTH_SERVICE_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      tei:
        condition: service_started

volumes:
  postgres-data:
  hf-cache:
