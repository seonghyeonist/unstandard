name: Rebuild CI

on:
  push:
    branches:
      - cursor/neon-drizzle-better-auth-rebuild-909d
  pull_request:
    branches:
      - main
      - cursor/neon-drizzle-better-auth-rebuild-909d

jobs:
  static-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Guard no legacy backend
        run: npm run guard:no-legacy-backend

      - name: Guard import boundaries
        run: npm run guard:boundaries

      - name: Verify schema drift
        run: |
          npm run db:generate
          git diff --exit-code -- drizzle lib/db/schema
